<!DOCTYPE html>
<html>
    <head>
        <title>Evolutel AI editor</title>

        <script src="main.js"></script>

        <link rel="stylesheet" href="litegraph.css">
        <link rel="stylesheet" href="assets/styles/main.css">
        <link rel="stylesheet" href="assets/styles/dialog.css">
        <link rel="stylesheet" href="assets/styles/editor.css">
        <link rel="stylesheet" href="assets/styles/explorer.css">
        <link rel="stylesheet" href="assets/styles/table.css">
    </head>
    <body>
        <div id="dialog_container">
            <template id="dialog_template">
                <div class="dialog">
                    <div class="dialog_bar">
                        <div id="dialog_title"></div>
                        <button id="dialog_close_btn">X</button>
                    </div>
                    <div class="dialog_content" id="dialog_content"></div>
                </div>
            </template>
            <template id="dialog_contents">
                <form id="new_graph_dialog">
                    <label for="new_graph_name_input">Name:</div>
                    <input id="new_graph_name_input" type="text" required />
                    <button id="new_graph_cancel_btn">Cancel</button>
                    <input type="submit" value="Create" />
                </form>
                <form id="confirm_dialog">
                    <div id="confirmation_dialog_text">...</div>
                    <button id="confirmation_dialog_cancel_btn">Cancel</button>
                    <input type="submit" value="Confirm" />
                </form>

                <form id="graph_settings_dialog" class="graph_settings_dialog">
                    <div class="graph_settings_header">
                        Configuring graph: <span id="graph_settings_graph_name">...</span>
                    </div>

                    <fieldset class="graph_settings_section">
                        <legend>Value inputs</legend>
                        <table class="graph_settings_table" id="graph_settings_value_inputs_table">
                            <thead>
                                <tr>
                                    <th>Name</th><th>Type</th><th>Default</th>
                                    <th>Allowed values (csv, optional)</th><th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                        <button type="button" class="graph_settings_add_btn"
                                id="graph_settings_value_inputs_add">+ Add value input</button>
                    </fieldset>

                    <fieldset class="graph_settings_section">
                        <legend>Value outputs</legend>
                        <table class="graph_settings_table" id="graph_settings_value_outputs_table">
                            <thead><tr><th>Name</th><th>Type</th><th></th></tr></thead>
                            <tbody></tbody>
                        </table>
                        <button type="button" class="graph_settings_add_btn"
                                id="graph_settings_value_outputs_add">+ Add value output</button>
                    </fieldset>

                    <fieldset class="graph_settings_section">
                        <legend>Flow outputs</legend>
                        <div class="graph_settings_hint">
                            Flow input is implicit (single entry "in").
                        </div>
                        <table class="graph_settings_table" id="graph_settings_flow_outputs_table">
                            <thead><tr><th>Name</th><th></th></tr></thead>
                            <tbody></tbody>
                        </table>
                        <button type="button" class="graph_settings_add_btn"
                                id="graph_settings_flow_outputs_add">+ Add flow output</button>
                    </fieldset>

                    <fieldset class="graph_settings_section">
                        <legend>Constants (JSON5, hierarchical — same shape as actions.json5 `values:`)</legend>
                        <textarea id="graph_settings_constants" class="graph_settings_constants"
                                  spellcheck="false" rows="10"
                                  placeholder='{ &#10;  positions: { arm: { "11": { up: 270, half: 450 } } }&#10;}'></textarea>
                        <div class="graph_settings_error" id="graph_settings_constants_error"></div>
                    </fieldset>

                    <div class="graph_settings_footer">
                        <button type="button" id="graph_settings_cancel_btn">Cancel</button>
                        <input type="submit" value="Save" />
                    </div>
                </form>
            </template>
        </div>

        <div id="app_container">
            <div id="editor">
                <div id="title_bar_view">The best editor :D</div>
                <div id="tabs_view">
                    <template id="editor_tab">
                        <button class="editor_tab_btn">
                            <span class="editor_tab_name"></span>
                            <button class="editor_tab_close_btn">X</button>
                        </button>
                    </template>
                    Here tabs will born...
                </div>
                <div id="editor_view">
                    <div id="editor_placeholder">
                        <span>Please create or open a graph</span>
                    </div>
                    <canvas id="editor_canvas"></canvas>
                </div>
                <div id="editor_controls_view">
                    <button id="open_graph_settings_btn">Open graph settings</button>
                </div>
            </div>

            <div id="sidebar">
                <div id="controls_view">
                    <button id="export_project_btn">Export project</button>
                    <button id="import_project_btn">Import project</button>
                    <button id="export_graph_btn">Export graph</button>
                    <button id="import_types_btn">Import types</button>
                </div>

                <hr/>

                <div id="table_view">
                    <div id="table_bar">
                        <div id="table_coordinate">Coordinate: <span id="table_coordinate_lbl">...</span></div>
                        <button id="table_fullscreen_btn">
                            <img src="assets/icons/fullscreen.svg" alt="fullscreen" />
                        </button>
                    </div>
                    <div id="table_container">
                        <img id="table_img" src="assets/table/2025.svg" alt="the play table" />
                        <canvas id="table_canvas"></canvas>
                    </div>
                </div>

                <hr/>

                <ul id="infos_view">
                    <li>Number of nodes: <span id="nb_nodes_lbl">...</span></li>
                    <li>Number of graphes: <span id="nb_graphes_lbl">...</span></li>
                </ul>

                <hr/>

                <div id="explorer_view">
                    <div id="explorer_bar">
                        <button id="explorer_create_btn">Create</button>
                    </div>
                    <hr/>
                    <div id="explorer_entry_container">
                        <template id="explorer_entry_template">
                            <div class="explorer_entry_btn">
                                <button class="explorer_entry_delete_btn">X</button>
                                <span class="explorer_entry_name">...</span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
